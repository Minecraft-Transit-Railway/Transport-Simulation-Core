name: Update
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update:
    name: Update Angular and Gradle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@main
      - name: Setup Node
        uses: actions/setup-node@main
        with:
          node-version: 24
      - name: Install Node packages
        run: npm ci --prefix website
      - name: Update packages
        run: npm run update-all --prefix website
      - name: Build Angular
        run: npm run build --prefix website
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@main
      - name: Setup JDK 21
        uses: actions/setup-java@main
        with:
          java-version: 21
          distribution: 'zulu'
          cache: gradle
      - name: Make gradle wrapper executable
        run: chmod +x ./gradlew
      - name: Update Gradle
        run: ./gradlew wrapper --gradle-version latest --no-daemon
      - name: Build JAR
        run: ./gradlew build --no-daemon
      - name: Commit changes
        uses: iarekylew00t/verified-bot-commit@main
        with:
          message: Update Angular packages
          files: |
            gradle/**
            gradlew
            gradlew.bat
            website/package.json
            website/package-lock.json
          max-retries: 5
