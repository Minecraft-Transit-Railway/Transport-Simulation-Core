status = warn
name = TransportSimulationCore

# Keep location lookup disabled for lower overhead (%L/%class/%method are intentionally not used)
appender.stdout.type = Console
appender.stdout.name = STDOUT
appender.stdout.target = SYSTEM_OUT
appender.stdout.follow = true
appender.stdout.layout.type = PatternLayout
appender.stdout.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5level %c{1} - %m%n%throwable
appender.stdout.filter.range.type = LevelRangeFilter
appender.stdout.filter.range.minLevel = trace
appender.stdout.filter.range.maxLevel = info
appender.stdout.filter.range.onMatch = ACCEPT
appender.stdout.filter.range.onMismatch = DENY

appender.stderr.type = Console
appender.stderr.name = STDERR
appender.stderr.target = SYSTEM_ERR
appender.stderr.follow = true
appender.stderr.layout.type = PatternLayout
appender.stderr.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5level %c{1} - %m%n%throwable
appender.stderr.filter.threshold.type = ThresholdFilter
appender.stderr.filter.threshold.level = warn
appender.stderr.filter.threshold.onMatch = ACCEPT
appender.stderr.filter.threshold.onMismatch = DENY

rootLogger.level = info
rootLogger.appenderRefs = stdout, stderr
rootLogger.appenderRef.stdout.ref = STDOUT
rootLogger.appenderRef.stderr.ref = STDERR

# Typical dependency noise controls for production readability
logger.jetty.name = org.eclipse.jetty
logger.jetty.level = warn
logger.jetty.additivity = false
logger.jetty.appenderRefs = stdout, stderr
logger.jetty.appenderRef.stdout.ref = STDOUT
logger.jetty.appenderRef.stderr.ref = STDERR

logger.okhttp.name = okhttp3
logger.okhttp.level = warn
logger.okhttp.additivity = false
logger.okhttp.appenderRefs = stdout, stderr
logger.okhttp.appenderRef.stdout.ref = STDOUT
logger.okhttp.appenderRef.stderr.ref = STDERR

logger.mtr.name = org.mtr
logger.mtr.level = info
logger.mtr.additivity = false
logger.mtr.appenderRefs = stdout, stderr
logger.mtr.appenderRef.stdout.ref = STDOUT
logger.mtr.appenderRef.stderr.ref = STDERR
