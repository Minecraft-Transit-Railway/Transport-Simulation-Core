<ng-container *transloco="let t">
	<p-select-button [ngModel]="getVisibility()" [options]="visibilityOptions" (onChange)="setVisibility($event)" [allowEmpty]="false">
		<ng-template #item let-item>
			<iconify-icon [icon]="item.icon" [pTooltip]="t(item.tooltip)" tooltipPosition="bottom" aria-hidden="true"></iconify-icon>
		</ng-template>
	</p-select-button>
</ng-container>
