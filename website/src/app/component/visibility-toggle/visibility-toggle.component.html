<ng-container *transloco="let t">
	<p-select-button [ngModel]="getVisibility()" [options]="visibilityOptions" (onChange)="setVisibility($event)" [allowEmpty]="false">
		<ng-template #item let-item>
			<span class="control-icon" [innerHTML]="getVisibilityIcon(item.icon)" [pTooltip]="t(item.tooltip)" tooltipPosition="bottom"></span>
		</ng-template>
	</p-select-button>
</ng-container>
