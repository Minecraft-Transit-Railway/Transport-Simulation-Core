<div class="column gap">
	<div class="column">
		@for (namePart of name() | splitName; track $index) {
			<div class="name" [class.cjk]="namePart.isCjk">{{ namePart.text }}</div>
		}
	</div>
	@let colorValue = color();
	@if (colorValue) {
		<div class="color-bar" [style.background-color]="colorValue | formatColor"></div>
	}
</div>
