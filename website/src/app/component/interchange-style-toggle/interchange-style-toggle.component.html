<p-select-button [options]="interchangeStyleOptions" [ngModel]="getInterchangeStyle()" (onChange)="setInterchangeStyle($event)">
	<ng-template #item let-item>
		<span class="control-icon" [innerHTML]="getInterchangeStyleIcon(item.icon)" [pTooltip]="item.tooltip" tooltipPosition="bottom"></span>
	</ng-template>
</p-select-button>
