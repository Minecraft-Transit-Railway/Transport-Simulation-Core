<ng-container *transloco="let t">
	<p-select-button [options]="interchangeStyleOptions" [ngModel]="getInterchangeStyle()" (onChange)="setInterchangeStyle($event)" [allowEmpty]="false">
		<ng-template #item let-item>
			<span class="control-icon" [innerHTML]="getInterchangeStyleIcon(item.icon)" [pTooltip]="t(item.tooltip)" tooltipPosition="bottom"></span>
		</ng-template>
	</p-select-button>
</ng-container>
