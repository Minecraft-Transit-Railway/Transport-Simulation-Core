<ng-container *transloco="let t">
	<app-drawer #sideMain [title]="getTitle()">
		<app-main-panel
				class="wrapper"
				(stationClicked)="onClickStation($event, sideMain, sideStation, sideClient, sideDirections, sideRoute, true)"
				(routeClicked)="onClickRoute($event, sideMain, sideStation, sideClient, sideDirections, sideRoute)"
				(clientClicked)="onClickClient($event, sideMain, sideStation, sideClient, sideDirections, sideRoute)"
				(directionsOpened)="onOpenDirections(undefined, sideMain, sideStation, sideClient, sideDirections, sideRoute)"/>
	</app-drawer>

	<app-drawer #sideStation [title]="t('station.title')" (closed)="onCloseStation()">
		<app-station-panel
				(stationClicked)="onClickStation($event, sideMain, sideStation, sideClient, sideDirections, sideRoute, true)"
				(routeClicked)="onClickRoute($event, sideMain, sideStation, sideClient, sideDirections, sideRoute)"
				(directionsOpened)="onOpenDirections($event, sideMain, sideStation, sideClient, sideDirections, sideRoute)"/>
	</app-drawer>

	<app-drawer #sideClient [title]="t('client.title')" (closed)="onCloseClient()">
		<app-client-panel
				(stationClicked)="onClickStation($event, sideMain, sideStation, sideClient, sideDirections, sideRoute, true)"
				(routeClicked)="onClickRoute($event, sideMain, sideStation, sideClient, sideDirections, sideRoute)"
				(directionsOpened)="onOpenDirections($event, sideMain, sideStation, sideClient, sideDirections, sideRoute)"/>
	</app-drawer>

	<app-drawer #sideDirections [title]="t('common.directions')" (closed)="onCloseDirections()">
		<app-directions/>
	</app-drawer>

	<app-drawer #sideRoute [title]="t('route.title')" (closed)="onCloseRoute()">
		<app-route-panel
				(stationClicked)="onClickStation($event, sideMain, sideStation, sideClient, sideDirections, sideRoute, true)"
				(routeClicked)="onClickRoute($event, sideMain, sideStation, sideClient, sideDirections, sideRoute)"/>
	</app-drawer>

	<app-map
			(stationClicked)="onClickStation($event, sideMain, sideStation, sideClient, sideDirections, sideRoute, false)"
			(clientClicked)="onClickClient($event, sideMain, sideStation, sideClient, sideDirections, sideRoute)"/>
	<button pButton class="button-corner" [rounded]="true" [text]="true" [raised]="true" size="large" (click)="onClickMain(sideMain, sideStation, sideClient, sideDirections, sideRoute)" [pTooltip]="t('common.menu')" tooltipPosition="left">
		<div class="material-icons">menu</div>
	</button>
</ng-container>
